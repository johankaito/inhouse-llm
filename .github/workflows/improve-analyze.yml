# Managed by `orch improve install` — do not edit by hand.
# This file is fully generated from .improve/config.toml; re-run install to update.
#
# TOPOLOGY: this workflow is a TRIGGER ONLY. It does NOT run the LLM and does NOT
# file issues. It runs a free cost-gate, joins Tailscale (tag:ci), SSHes to the
# analysis host, and runs `orch improve analyze` there. The host's orch dispatches
# the Claude Code proposer session, which does the analysis and `gh issue create`
# using the HOST's gh auth. The runner therefore needs NO ANTHROPIC_API_KEY and
# NO issues:write permission — issues are filed host-side.
name: improve-analyze

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass the cost gate and dispatch analysis even if scope is unchanged"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: improve-analyze-inhouse-llm
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cost gate (FREE — pure git, no LLM). Skip a scheduled run when nothing
      # under the configured scope changed on the DEFAULT branch since the last
      # analyzed sha. That sha is read from state.json on the improve/ledger
      # branch (the dedicated mutable-state branch) — NOT from default-branch
      # commit history, so this gate never depends on automation having written
      # the default branch. workflow_dispatch always runs; force=true bypasses
      # the gate explicitly.
      - name: Cost gate
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual/forced run — bypassing cost gate."
            exit 0
          fi
          # Pull the ledger branch and read the last analyzed sha from state.json.
          git fetch origin improve/ledger 2>/dev/null || true
          STATE=$(git show origin/improve/ledger:.improve/state.json 2>/dev/null || echo "")
          if [ -z "$STATE" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No ledger/state.json (first run) — running."
            exit 0
          fi
          # Extract last_analyzed_sha without assuming jq is present.
          LAST_SHA=$(printf '%s' "$STATE" | grep -oE '"last_analyzed_sha"[[:space:]]*:[[:space:]]*"[^"]*"' | head -1 | sed -E 's/.*"last_analyzed_sha"[[:space:]]*:[[:space:]]*"([^"]*)".*/\1/')
          if [ -z "$LAST_SHA" ] || ! git cat-file -e "${LAST_SHA}^{commit}" 2>/dev/null; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "last_analyzed_sha empty or unknown to this checkout — running."
            exit 0
          fi
          CHANGES=$(git log "${LAST_SHA}..HEAD" --oneline -- '**' | wc -l | tr -d ' ')
          echo "Default-branch changes under scope since ${LAST_SHA}: $CHANGES"
          if [ "$CHANGES" -eq "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify via Telegram — skipped (no scope changes)
        if: steps.gate.outputs.skip == 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=⏭ improve-analyze johankaito/inhouse-llm: skipped — no scope changes since last run ($(date +%Y-%m-%d))" > /dev/null

      - name: Join Tailscale
        if: steps.gate.outputs.skip != 'true'
        uses: tailscale/github-action@v4
        with:
          # Non-expiring OAuth client (scope auth_keys:write, tag:ci) — the action
          # mints a fresh ephemeral key each run, so the cron never breaks on key expiry.
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # Dispatch analysis on the host. orch on mac-15 dispatches the Claude
      # proposer session, which does analysis + `gh issue create` with HOST gh auth.
      - name: Dispatch analysis on host
        if: steps.gate.outputs.skip != 'true'
        env:
          REPO: ${{ github.repository }}
          SSH_TARGET: ${{ secrets.SELFIMPROVE_SSH_TARGET }}
        run: |
          SSH_TARGET="${SSH_TARGET:-mac-15}"
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            "$SSH_TARGET" \
            "orch improve analyze --repo ${REPO}"

      - name: Notify via Telegram — analysis dispatched
        if: steps.gate.outputs.skip != 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🔎 improve-analyze: analysis dispatched to mac-15 for johankaito/inhouse-llm ($(date +%Y-%m-%d))" > /dev/null
