name: Self-Improve inhouse-llm

on:
  schedule:
    # 8am Sydney time (UTC+10 AEST = 22:00 UTC)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout inhouse-llm
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Commit-gating: skip if twin/ hasn't changed since the last self-improve run.
      # workflow_dispatch always runs.
      - name: Check for changes since last self-improve
        id: gate
        if: github.event_name == 'schedule'
        run: |
          LAST_SI=$(git log --format="%H" --all --grep="self-improvement pass" -1 2>/dev/null || echo "")
          if [ -z "$LAST_SI" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No prior self-improve commit — running."
            exit 0
          fi
          CHANGES=$(git log --oneline "${LAST_SI}..HEAD" -- twin/ | wc -l | tr -d ' ')
          echo "Changes to twin/ since last self-improve: $CHANGES"
          if [ "$CHANGES" -eq "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify via Telegram — skipped (no twin/ changes)
        if: steps.gate.outputs.skip == 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=⏭ inhouse-llm self-improve: skipped — no twin/ changes since last run ($(date +%Y-%m-%d))" > /dev/null

      - name: Join Tailscale
        if: steps.gate.outputs.skip != 'true'
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Run orch self-improve
        if: steps.gate.outputs.skip != 'true'
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            ${{ secrets.SELFIMPROVE_SSH_TARGET }} \
            'orch self-improve inhouse-llm'
